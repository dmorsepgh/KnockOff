<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnockOff — Show Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a14;
            color: #e0e0e0;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        /* ─── Top Bar ─── */
        .topbar {
            background: #111122;
            border-bottom: 2px solid #cc0000;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .logo {
            color: #cc0000;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .topbar .logo span { color: #fff; font-weight: 300; }
        .topbar .show-title {
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            border-bottom: 1px dashed #555;
        }
        .topbar .timer {
            font-size: 24px;
            font-family: 'SF Mono', 'Menlo', monospace;
            color: #44ff44;
        }
        .topbar .timer.over { color: #ff4444; }

        /* ─── Main Layout ─── */
        .main {
            display: flex;
            min-height: calc(100vh - 52px);
        }

        /* ─── Sidebar: Cast ─── */
        .sidebar {
            width: 220px;
            background: #0f0f1e;
            border-right: 1px solid #1a1a2e;
            padding: 16px;
            overflow-y: auto;
        }
        .sidebar h3 {
            color: #cc0000;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 16px 0 8px;
        }
        .sidebar h3:first-child { margin-top: 0; }
        .cast-chip {
            display: inline-block;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            padding: 4px 8px;
            margin: 2px;
            font-size: 11px;
            cursor: grab;
            transition: all 0.15s;
            user-select: none;
        }
        .cast-chip:hover { border-color: #cc0000; background: #1e1e32; }
        .cast-chip.selected { border-color: #cc0000; background: #2a1a1a; }

        /* ─── Rundown Board ─── */
        .rundown {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }

        .block {
            background: #111122;
            border: 1px solid #1e1e30;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .block:hover { border-color: #333; }
        .block.status-done { border-left: 4px solid #44ff44; }
        .block.status-scripted { border-left: 4px solid #ffaa00; }
        .block.status-rendering { border-left: 4px solid #4488ff; }
        .block.status-error { border-left: 4px solid #ff4444; }
        .block.status-empty { border-left: 4px solid #333; }

        .block-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d1a;
            gap: 12px;
        }
        .block-label {
            background: #cc0000;
            color: white;
            font-weight: 700;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 3px;
            min-width: 90px;
            text-align: center;
            cursor: pointer;
        }
        .block-format {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .block-duration {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            color: #888;
            margin-left: auto;
        }
        .block-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .block-status.empty { background: #222; color: #666; }
        .block-status.scripted { background: #332a00; color: #ffaa00; }
        .block-status.rendering { background: #0a1a33; color: #4488ff; }
        .block-status.done { background: #0a330a; color: #44ff44; }
        .block-status.error { background: #330a0a; color: #ff4444; }

        .block-delete {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .block-delete:hover { color: #ff4444; }

        .block-body { padding: 16px; }

        .block-cast {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            min-height: 32px;
            padding: 8px;
            background: #0a0a14;
            border-radius: 4px;
            border: 1px dashed #2a2a3e;
        }
        .block-cast .cast-chip {
            cursor: pointer;
        }
        .block-cast-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .idea-field {
            width: 100%;
            background: #0a0a14;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            color: #e0e0e0;
            padding: 10px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 12px;
        }
        .idea-field::placeholder { color: #444; }
        .idea-field:focus { outline: none; border-color: #cc0000; }

        .script-area {
            width: 100%;
            background: #0a0a14;
            border: 1px solid #2a2a3e;
            border-radius: 4px;
            color: #ccc;
            padding: 10px;
            font-size: 12px;
            font-family: 'SF Mono', 'Menlo', monospace;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 12px;
            display: none;
        }
        .script-area.visible { display: block; }

        .block-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: #cc0000;
            color: white;
        }
        .btn-primary:hover { background: #ee2222; }
        .btn-primary:disabled { background: #441111; color: #666; cursor: not-allowed; }
        .btn-secondary {
            background: #1a1a2e;
            color: #ccc;
            border: 1px solid #2a2a3e;
        }
        .btn-secondary:hover { background: #222244; }
        .btn-success {
            background: #0a440a;
            color: #44ff44;
            border: 1px solid #1a661a;
        }

        .progress-bar-small {
            flex: 1;
            height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            overflow: hidden;
            max-width: 200px;
        }
        .progress-bar-small .fill {
            height: 100%;
            background: linear-gradient(90deg, #4488ff, #44aaff);
            border-radius: 3px;
            transition: width 0.5s;
        }

        /* ─── Add Block Button ─── */
        .add-block {
            border: 2px dashed #2a2a3e;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            color: #444;
            font-size: 14px;
            transition: all 0.2s;
            margin-bottom: 16px;
        }
        .add-block:hover { border-color: #cc0000; color: #cc0000; }

        /* ─── Bottom Bar ─── */
        .bottombar {
            position: fixed;
            bottom: 0;
            left: 220px;
            right: 0;
            background: #111122;
            border-top: 1px solid #1e1e30;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .bottombar .btn { padding: 8px 20px; font-size: 13px; }

        /* ─── Video Preview Modal ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #111;
            border-radius: 8px;
            padding: 16px;
            max-width: 80vw;
        }
        .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 4px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        /* ─── Shows List ─── */
        .shows-list {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        .shows-list h2 { color: #cc0000; margin-bottom: 20px; }
        .show-item {
            background: #111122;
            border: 1px solid #1e1e30;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .show-item:hover { border-color: #cc0000; }
        .show-item .title { font-size: 16px; font-weight: 600; }
        .show-item .meta { font-size: 12px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">KNOCKOFF <span>SHOW RUNNER</span></div>
        <div class="show-title" id="show-title" onclick="editShowTitle()">Loading...</div>
        <div class="timer" id="timer">00:00 / 30:00</div>
    </div>

    <!-- Shows List View -->
    <div id="shows-view" class="shows-list" style="display:none;">
        <h2>Your Shows</h2>
        <div id="shows-container"></div>
        <button class="btn btn-primary" style="margin-top:16px;padding:12px 24px;font-size:14px;" onclick="createShow()">+ New Show</button>
    </div>

    <!-- Show Editor View -->
    <div id="editor-view" class="main" style="display:none;">
        <div class="sidebar">
            <h3>CNN</h3>
            <div id="cast-cnn"></div>
            <h3>MSNBC</h3>
            <div id="cast-msnbc"></div>
            <h3>Fox News</h3>
            <div id="cast-fox"></div>
            <h3>Other</h3>
            <div id="cast-other"></div>
        </div>

        <div class="rundown" id="rundown">
            <!-- Blocks rendered here -->
        </div>
    </div>

    <div class="bottombar" id="bottombar" style="display:none;">
        <button class="btn btn-secondary" onclick="location.hash=''">← All Shows</button>
        <button class="btn btn-primary" style="background:#6600cc;" onclick="autoProduce()">🤖 Full AI Show</button>
        <div style="flex:1"></div>
        <button class="btn btn-primary" onclick="renderAll()">Render All Blocks</button>
        <button class="btn btn-success" onclick="exportShow()">Export Full Show</button>
    </div>

    <!-- Video Preview -->
    <div class="modal-overlay" id="preview-modal">
        <span class="modal-close" onclick="closePreview()">×</span>
        <div class="modal-content">
            <video id="preview-video" controls></video>
        </div>
    </div>

    <script>
        let currentShow = null;
        let cast = {};
        let formats = {};
        let jobs = {};

        // ─── Init ───
        async function init() {
            cast = await (await fetch('/api/cast')).json();
            formats = await (await fetch('/api/formats')).json();
            renderCastSidebar();
            handleRoute();
            window.addEventListener('hashchange', handleRoute);
            setInterval(pollJobs, 3000);
        }

        function handleRoute() {
            const hash = location.hash.slice(1);
            if (hash) {
                loadShow(hash);
            } else {
                showShowsList();
            }
        }

        // ─── Shows List ───
        async function showShowsList() {
            document.getElementById('shows-view').style.display = 'block';
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('bottombar').style.display = 'none';
            document.getElementById('show-title').textContent = 'Show Runner';

            const shows = await (await fetch('/api/shows')).json();
            const container = document.getElementById('shows-container');
            if (shows.length === 0) {
                container.innerHTML = '<p style="color:#555">No shows yet. Create one to get started.</p>';
            } else {
                container.innerHTML = shows.map(s => `
                    <div class="show-item" onclick="location.hash='${s.id}'">
                        <div class="title">${s.title}</div>
                        <div class="meta">${s.updated || ''}</div>
                    </div>
                `).join('');
            }
        }

        async function createShow() {
            const title = prompt('Show title:', 'KnockOff News — Episode ' + (Math.floor(Math.random()*90)+10));
            if (!title) return;
            const show = await (await fetch('/api/shows', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title})
            })).json();
            location.hash = show.id;
        }

        // ─── Load Show ───
        async function loadShow(showId) {
            const show = await (await fetch(`/api/shows/${showId}`)).json();
            if (show.error) { location.hash = ''; return; }
            currentShow = show;

            document.getElementById('shows-view').style.display = 'none';
            document.getElementById('editor-view').style.display = 'flex';
            document.getElementById('bottombar').style.display = 'flex';
            document.getElementById('show-title').textContent = show.title;

            renderBlocks();
            updateTimer();
        }

        // ─── Cast Sidebar ───
        function renderCastSidebar() {
            const networks = {cnn: [], msnbc: [], fox: [], other: []};
            for (const [id, info] of Object.entries(cast)) {
                const net = info.network.toLowerCase();
                if (net.includes('cnn')) networks.cnn.push({id, ...info});
                else if (net.includes('msnbc')) networks.msnbc.push({id, ...info});
                else if (net.includes('fox')) networks.fox.push({id, ...info});
                else networks.other.push({id, ...info});
            }

            for (const [key, members] of Object.entries(networks)) {
                const el = document.getElementById(`cast-${key}`);
                if (el) {
                    el.innerHTML = members.map(m =>
                        `<div class="cast-chip" draggable="true" data-id="${m.id}"
                             ondragstart="dragCast(event, '${m.id}')"
                             onclick="clickCast('${m.id}')"
                             title="${m.name} — Click to add to selected block">${m.name.split(' ').pop()}</div>`
                    ).join('');
                }
            }
        }

        let selectedBlockForCast = null;

        function dragCast(e, castId) {
            e.dataTransfer.setData('text/plain', castId);
        }

        // Click cast chip in sidebar to add to selected block (auto-selects first block if none selected)
        function clickCast(castId) {
            if (!currentShow || !currentShow.blocks.length) return;

            // Auto-select first block if none selected
            if (!selectedBlockForCast) {
                selectedBlockForCast = currentShow.blocks[0].id;
            }

            const targetBlock = currentShow.blocks.find(b => b.id === selectedBlockForCast);
            if (!targetBlock) return;

            // Check format cast limits
            const fmt = formats[targetBlock.format] || {};
            if (fmt.max_cast && targetBlock.cast.length >= fmt.max_cast) {
                // Try next block that has room
                const nextBlock = currentShow.blocks.find(b => {
                    const f = formats[b.format] || {};
                    return (!f.max_cast || b.cast.length < f.max_cast) && !b.cast.includes(castId);
                });
                if (nextBlock) {
                    selectedBlockForCast = nextBlock.id;
                    nextBlock.cast.push(castId);
                    saveBlock(nextBlock.id, {cast: nextBlock.cast});
                    renderBlocks();
                }
                return;
            }

            if (!targetBlock.cast.includes(castId)) {
                targetBlock.cast.push(castId);
                saveBlock(targetBlock.id, {cast: targetBlock.cast});
                renderBlocks();
            }
        }

        // ─── Render Blocks ───
        function renderBlocks() {
            const rundown = document.getElementById('rundown');
            let html = '';

            currentShow.blocks.forEach((block, idx) => {
                const fmt = formats[block.format] || {};
                const dur = block.duration ? formatTime(block.duration) : '--:--';
                const hasScript = block.script ? 'visible' : '';

                html += `
                <div class="block status-${block.status}" id="block-${block.id}">
                    <div class="block-header">
                        <div class="block-label" onclick="editBlockLabel('${block.id}')">${block.label}</div>
                        <select class="block-format" onchange="updateBlockFormat('${block.id}', this.value)">
                            ${Object.entries(formats).map(([k, v]) =>
                                `<option value="${k}" ${k === block.format ? 'selected' : ''}>${v.name}</option>`
                            ).join('')}
                        </select>
                        <span class="block-status ${block.status}">${block.status.toUpperCase()}</span>
                        <span class="block-duration">${dur}</span>
                        <button class="block-delete" onclick="deleteBlock('${block.id}')" title="Remove block">✕</button>
                    </div>
                    <div class="block-body">
                        <div class="block-cast-label">CAST — ${selectedBlockForCast === block.id ? '⬤ SELECTED (click names in sidebar to add)' : 'click here to select, then click sidebar names'}</div>
                        <div class="block-cast" id="cast-${block.id}"
                             ondrop="dropCast(event, '${block.id}')"
                             ondragover="event.preventDefault()"
                             onclick="selectBlockForCast('${block.id}')"
                             style="${selectedBlockForCast === block.id ? 'border-color:#cc0000;border-style:solid;background:#0d0a14;' : ''}"
                             title="Click here first, then click cast names in sidebar to add">
                            ${(block.cast || []).map(c => {
                                const info = cast[c] || {name: c};
                                return `<div class="cast-chip" onclick="removeCast('${block.id}', '${c}')"
                                             title="Click to remove">${info.name}</div>`;
                            }).join('')}
                        </div>

                        <div style="position:relative">
                            <textarea class="idea-field" id="idea-${block.id}"
                                placeholder="Describe the funny scenario here... or click ✦ AI Suggest"
                                onblur="saveIdea('${block.id}')">${block.idea || ''}</textarea>
                            <button class="btn btn-secondary" style="position:absolute;top:8px;right:8px;font-size:11px;padding:3px 8px;"
                                onclick="suggestIdea('${block.id}')">✦ AI Suggest</button>
                        </div>

                        <textarea class="script-area ${hasScript}" id="script-${block.id}"
                            onblur="saveScript('${block.id}')">${block.script || ''}</textarea>

                        <div class="block-actions">
                            <button class="btn btn-secondary" onclick="generateScript('${block.id}')"
                                ${!block.idea || !block.cast?.length ? 'disabled' : ''}>
                                ✦ Generate Script
                            </button>
                            <button class="btn btn-secondary" onclick="toggleScript('${block.id}')">
                                ${block.script ? '📝 Edit Script' : '📝 Script'}
                            </button>
                            <button class="btn btn-primary" onclick="renderBlock('${block.id}')"
                                ${!block.script ? 'disabled' : ''}>
                                ▶ Render
                            </button>
                            ${block.video_path ? `<button class="btn btn-success" onclick="previewBlock('${block.id}')">👁 Preview</button>` : ''}
                            ${jobs[block.id]?.status === 'rendering' ? `
                                <div class="progress-bar-small">
                                    <div class="fill" style="width:${jobs[block.id]?.percent || 0}%"></div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
            });

            html += `<div class="add-block" onclick="addBlock()">+ Add Block</div>`;
            html += `<div style="height:80px"></div>`;  // Spacer for bottom bar

            rundown.innerHTML = html;
        }

        // ─── Block Actions ───
        function selectBlockForCast(blockId) {
            selectedBlockForCast = blockId;
            // Highlight the selected cast area
            document.querySelectorAll('.block-cast').forEach(el => el.style.borderColor = '#2a2a3e');
            const el = document.getElementById(`cast-${blockId}`);
            if (el) el.style.borderColor = '#cc0000';
        }

        function dropCast(e, blockId) {
            e.preventDefault();
            const castId = e.dataTransfer.getData('text/plain');
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (block && !block.cast.includes(castId)) {
                block.cast.push(castId);
                saveBlock(blockId, {cast: block.cast});
                renderBlocks();
            }
        }

        function removeCast(blockId, castId) {
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (block) {
                block.cast = block.cast.filter(c => c !== castId);
                saveBlock(blockId, {cast: block.cast});
                renderBlocks();
            }
        }

        async function saveIdea(blockId) {
            const idea = document.getElementById(`idea-${blockId}`).value;
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (block) block.idea = idea;
            await saveBlock(blockId, {idea});
        }

        async function saveScript(blockId) {
            const script = document.getElementById(`script-${blockId}`).value;
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (block) block.script = script;
            await saveBlock(blockId, {script, status: script ? 'scripted' : 'empty'});
        }

        function toggleScript(blockId) {
            const el = document.getElementById(`script-${blockId}`);
            el.classList.toggle('visible');
        }

        async function suggestIdea(blockId) {
            const btn = event.target;
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Thinking...';

            try {
                const res = await fetch(`/api/shows/${currentShow.id}/blocks/${blockId}/suggest-idea`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.error) {
                    alert('Suggestion failed: ' + data.error);
                } else {
                    const field = document.getElementById(`idea-${blockId}`);
                    field.value = data.idea;
                    const block = currentShow.blocks.find(b => b.id === blockId);
                    if (block) block.idea = data.idea;
                    saveBlock(blockId, {idea: data.idea});
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
            btn.disabled = false;
            btn.textContent = origText;
        }

        async function generateScript(blockId) {
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (!block) return;

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Writing...';

            try {
                const res = await fetch(`/api/shows/${currentShow.id}/blocks/${blockId}/generate-script`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.error) {
                    alert('Script generation failed: ' + data.error);
                } else {
                    block.script = data.script;
                    block.status = 'scripted';
                    renderBlocks();
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function renderBlock(blockId) {
            const res = await fetch(`/api/shows/${currentShow.id}/blocks/${blockId}/render`, {
                method: 'POST'
            });
            const data = await res.json();
            if (data.error) {
                alert('Render failed: ' + data.error);
            } else {
                const block = currentShow.blocks.find(b => b.id === blockId);
                if (block) block.status = 'rendering';
                renderBlocks();
            }
        }

        function previewBlock(blockId) {
            const video = document.getElementById('preview-video');
            video.src = `/api/shows/${currentShow.id}/blocks/${blockId}/preview`;
            document.getElementById('preview-modal').classList.add('active');
            video.play();
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.remove('active');
            document.getElementById('preview-video').pause();
        }

        async function addBlock() {
            await fetch(`/api/shows/${currentShow.id}/blocks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            });
            currentShow = await (await fetch(`/api/shows/${currentShow.id}`)).json();
            renderBlocks();
        }

        async function deleteBlock(blockId) {
            if (!confirm('Delete this block?')) return;
            await fetch(`/api/shows/${currentShow.id}/blocks/${blockId}`, {method: 'DELETE'});
            currentShow = await (await fetch(`/api/shows/${currentShow.id}`)).json();
            renderBlocks();
        }

        async function saveBlock(blockId, data) {
            await fetch(`/api/shows/${currentShow.id}/blocks/${blockId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        }

        function editBlockLabel(blockId) {
            const block = currentShow.blocks.find(b => b.id === blockId);
            const label = prompt('Block label:', block.label);
            if (label) {
                block.label = label;
                saveBlock(blockId, {label});
                renderBlocks();
            }
        }

        function updateBlockFormat(blockId, format) {
            const block = currentShow.blocks.find(b => b.id === blockId);
            if (block) {
                block.format = format;
                saveBlock(blockId, {format});
            }
        }

        function editShowTitle() {
            if (!currentShow) return;
            const title = prompt('Show title:', currentShow.title);
            if (title) {
                currentShow.title = title;
                document.getElementById('show-title').textContent = title;
                fetch(`/api/shows/${currentShow.id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title})
                });
            }
        }

        // ─── Timer ───
        function updateTimer() {
            if (!currentShow) return;
            let total = 0;
            currentShow.blocks.forEach(b => total += b.duration || 0);
            const target = currentShow.target_duration || 1800;
            const el = document.getElementById('timer');
            el.textContent = `${formatTime(total)} / ${formatTime(target)}`;
            el.className = total > target ? 'timer over' : 'timer';
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // ─── Poll Jobs ───
        async function pollJobs() {
            try {
                jobs = await (await fetch('/api/jobs')).json();
                if (currentShow) {
                    let needsRefresh = false;
                    currentShow.blocks.forEach(b => {
                        if (jobs[b.id]) {
                            if (jobs[b.id].status === 'done' && b.status === 'rendering') {
                                needsRefresh = true;
                            }
                        }
                    });
                    if (needsRefresh) {
                        currentShow = await (await fetch(`/api/shows/${currentShow.id}`)).json();
                    }
                    renderBlocks();
                    updateTimer();
                }
            } catch (e) {}
        }

        // ─── Render All ───
        async function renderAll() {
            if (!confirm('Render all blocks with scripts?')) return;
            for (const block of currentShow.blocks) {
                if (block.script && block.status !== 'done' && block.status !== 'rendering') {
                    await renderBlock(block.id);
                    // Small delay between kicks
                    await new Promise(r => setTimeout(r, 500));
                }
            }
        }

        async function autoProduce() {
            if (!currentShow) return;
            if (!confirm('This will replace all blocks and have AI produce a full 30-minute show. Continue?')) return;

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '🤖 Producing...';

            try {
                const res = await fetch(`/api/shows/${currentShow.id}/auto-produce`, {method: 'POST'});
                const data = await res.json();
                if (data.error) {
                    alert('Failed: ' + data.error);
                } else {
                    // Poll for updates as scripts get generated
                    const pollProduce = setInterval(async () => {
                        currentShow = await (await fetch(`/api/shows/${currentShow.id}`)).json();
                        renderBlocks();
                        updateTimer();
                        const allScripted = currentShow.blocks.every(b => b.status === 'scripted' || b.status === 'error');
                        if (allScripted) {
                            clearInterval(pollProduce);
                            btn.disabled = false;
                            btn.textContent = '🤖 Full AI Show';
                        }
                    }, 5000);
                }
            } catch (e) {
                alert('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = '🤖 Full AI Show';
            }
        }

        async function exportShow() {
            if (!currentShow) return;
            const rendered = currentShow.blocks.filter(b => b.video_path);
            if (!rendered.length) {
                alert('No rendered blocks to assemble. Render some blocks first.');
                return;
            }
            if (!confirm(`Assemble ${rendered.length} rendered blocks into final show?`)) return;

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ Assembling...';

            try {
                const res = await fetch(`/api/shows/${currentShow.id}/assemble`, {method: 'POST'});
                const data = await res.json();
                if (data.error) {
                    alert('Assembly failed: ' + data.error);
                    btn.disabled = false;
                    btn.textContent = 'Export Full Show';
                    return;
                }

                // Poll for assembly completion
                const pollAssembly = setInterval(async () => {
                    const jobData = await (await fetch('/api/jobs')).json();
                    if (jobData.assemble?.status === 'done') {
                        clearInterval(pollAssembly);
                        btn.disabled = false;
                        btn.textContent = 'Export Full Show';
                        currentShow = await (await fetch(`/api/shows/${currentShow.id}`)).json();
                        alert('Show assembled! Check output/keepers/ for the final video.');
                    } else if (jobData.assemble?.status === 'error') {
                        clearInterval(pollAssembly);
                        btn.disabled = false;
                        btn.textContent = 'Export Full Show';
                        alert('Assembly failed: ' + (jobData.assemble?.progress || 'Unknown error'));
                    }
                }, 3000);
            } catch (e) {
                alert('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Export Full Show';
            }
        }

        // ─── Go ───
        init();
    </script>
</body>
</html>
